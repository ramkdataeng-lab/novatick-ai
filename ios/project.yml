name: NovaTick
options:
  bundleIdPrefix: com.ramkdataeng
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad

targets:
  NovaTick:
    type: application
    platform: iOS
    sources:
      - NovaTick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ramkdataeng.novatick
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: NovaTick/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "$(PROVISIONING_PROFILE_SPECIFIER)"
